name: E2E API Tests

on:
  workflow_dispatch:

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install test dependencies
        run: pnpm install --frozen-lockfile

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: danielcawen/pie-in-the-sky
          path: app

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build app
        working-directory: app
        run: npm run build

      - name: Start app
        working-directory: app
        run: npm start &

      - name: Wait for app
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3000 && break; sleep 3; done

      - name: Run API tests
        run: pnpm test:api
